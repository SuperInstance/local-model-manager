name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest]
        include:
          - python-version: '3.12'
            os: windows-latest
          - python-version: '3.12'
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt
            **/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Lint with black
        run: |
          black --check --diff local_model_manager/

      - name: Lint with isort
        run: |
          isort --check-only --diff local_model_manager/

      - name: Type check with mypy
        run: |
          mypy local_model_manager/ || true

      - name: Run tests with coverage
        run: |
          pytest --cov=local_model_manager --cov-report=xml --cov-report=term-missing --cov-report=html -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests-py${{ matrix.python-version }}
          name: codecov-py${{ matrix.python-version }}-${{ matrix.os }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload coverage reports to GitHub
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: htmlcov/

      - name: Check coverage threshold
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          coverage report --fail-under=65 || true

  test-minimal:
    name: Test with minimal dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          pytest tests/ -v --no-cov

  test-gpu-support:
    name: Test GPU support detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test GPU detection
        run: |
          python -c "
          from local_model_manager.core.device_manager import DeviceManager
          device_manager = DeviceManager()
          print(f'CUDA Available: {device_manager.cuda_available}')
          print(f'GPU Count: {device_manager.gpu_count}')
          print('GPU detection test passed!')
          "
