[pytest]
# Pytest configuration for local-model-manager

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers
    --strict-markers
    # Coverage reporting
    --cov=local_model_manager
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Coverage thresholds
    --cov-fail-under=80
    # Warnings as errors
    -W error
    # Ignore specific warnings
    -W ignore::DeprecationWarning
    # Show extra test summary info
    --tb=short

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external resources)
    slow: Slow tests (run separately)
    gpu: Tests requiring GPU access
    network: Tests requiring network access
    async: Tests using async/await
    mock: Tests using heavy mocking

# Minimum version
minversion = 7.0

# Log options
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = local_model_manager
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */dist-packages/*
    */examples/*
    */scripts/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
